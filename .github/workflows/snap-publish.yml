# Build + publish the sealed-env snap to the Snap Store.
#
# Trigger: studio-v* tag push (canonical) or workflow_dispatch.
#
# Channel resolution from the tag:
#   studio-v*-alpha*   → edge
#   studio-v*-beta*    → candidate
#   studio-v*-rc*      → candidate
#   studio-v*          → stable
#
# Secrets required:
#   SNAPCRAFT_STORE_CREDENTIALS — output of `snapcraft export-login`
#                                  with snaps=sealed-env, channels=edge,candidate,stable

name: Snap publish

on:
  push:
    tags:
      - 'studio-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to package (e.g. studio-v0.1.0-alpha.1)'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: snap-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-publish:
    name: snap build + Store upload
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Resolve channel
        id: chan
        run: |
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          if   [[ "$TAG" == *-alpha* ]]; then CH=edge
          elif [[ "$TAG" == *-beta*  ]]; then CH=candidate
          elif [[ "$TAG" == *-rc*    ]]; then CH=candidate
          else                                CH=stable
          fi
          echo "tag=$TAG"      >> "$GITHUB_OUTPUT"
          echo "channel=$CH"   >> "$GITHUB_OUTPUT"

      - name: Build snap
        id: snapcraft
        uses: snapcore/action-build@3bdaa03e1ba6bf59a65f84a751d943d549a54e79 # v1.3.0

      # Attach BEFORE Store upload so the .snap is always downloadable from
      # the GitHub Release even when the Store secret isn't configured. Runs
      # for both `push` (tag) and `workflow_dispatch` events.
      - name: Attach snap to GitHub Release
        if: steps.snapcraft.outputs.snap != ''
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          tag_name: ${{ steps.chan.outputs.tag }}
          files: ${{ steps.snapcraft.outputs.snap }}
          fail_on_unmatched_files: true

      # Optional: push to Snap Store edge/candidate/stable channel. Soft-fails
      # if the secret isn't set so the workflow stays green and the .snap
      # remains attached above.
      - name: Upload to Snap Store
        if: env.SNAPCRAFT_STORE_CREDENTIALS != ''
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        run: |
          sudo snap install snapcraft --classic
          snapcraft upload --release=${{ steps.chan.outputs.channel }} \
            "${{ steps.snapcraft.outputs.snap }}"

      - name: Note skipped upload
        if: env.SNAPCRAFT_STORE_CREDENTIALS == ''
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        run: |
          echo "::warning::SNAPCRAFT_STORE_CREDENTIALS not set — skipping Store upload."
          echo "The .snap is still attached to the GitHub Release."
          echo "To enable Store publishing: snapcraft export-login --snaps sealed-env --channels edge,candidate,stable creds.txt"
          echo "Then set the file content as the SNAPCRAFT_STORE_CREDENTIALS repo secret."
