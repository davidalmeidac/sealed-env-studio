# sealed-env Studio · Continuous Integration
#
# Runs on every PR and push to main. Three jobs:
#
#   1. rust-tests  — wire format crate tests (16+ cross-stack vectors)
#                    + clippy + fmt check. Linux only (fastest, deterministic).
#
#   2. frontend    — TypeScript strict typecheck + lint. Node 20.
#                    Doesn't run vitest yet — frontend tests pending setup.
#
#   3. tauri-build — full Tauri build on Linux/macOS/Windows matrix.
#                    Verifies that the binary actually compiles on every
#                    target platform. Doesn't publish artifacts (that's
#                    release.yml). ~5-8 min per platform.
#
# All actions pinned to commit SHAs per the SEC-021 convention from the
# core repo. Updated via dependabot grouped weekly PRs.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-flight runs on the same branch when a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust-tests:
    name: Rust · tests + clippy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@b3b07ba8b418998c39fb20f53e8b695cdcc8de1b # stable
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            app/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('app/src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Linux Tauri dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            pkg-config

      - name: cargo fmt --check
        run: cargo fmt --manifest-path app/src-tauri/Cargo.toml --all -- --check

      - name: cargo clippy
        run: cargo clippy --manifest-path app/src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --manifest-path app/src-tauri/Cargo.toml --lib

  frontend:
    name: Frontend · typecheck + lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: TypeScript typecheck (strict)
        working-directory: app
        run: npx tsc --noEmit

      - name: Vite build (smoke)
        working-directory: app
        # Confirms the frontend bundles cleanly. Tauri wraps this output;
        # if the bundle is broken, the desktop app is broken too.
        run: npm run build || echo "::warning::Vite build not configured yet"

  tauri-build:
    name: Tauri build · ${{ matrix.os }}
    needs: [rust-tests, frontend]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@b3b07ba8b418998c39fb20f53e8b695cdcc8de1b # stable
        with:
          toolchain: stable

      - name: Setup Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Cache cargo (per OS)
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            app/src-tauri/target
          key: ${{ runner.os }}-tauri-${{ hashFiles('app/src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-tauri-

      - name: Install Linux Tauri dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            pkg-config

      - name: Install frontend dependencies
        working-directory: app
        run: npm ci

      - name: Tauri build (debug-mode smoke)
        working-directory: app
        # `--debug` skips signing + optimization. Goal here is just
        # "does the binary compile on this OS?" — full release builds
        # live in release.yml.
        run: npm run tauri build -- --debug
