name: sealed-env
title: sealed-env Studio
base: core22
summary: Desktop GUI for encrypted .env file management
description: |
  sealed-env Studio is a desktop companion for the sealed-env library:
  cross-stack encrypted .env file management with Argon2id key derivation,
  AES-256-GCM at rest, optional HMAC integrity, and TOTP-based unsealing
  for production deploys.

  Studio adds a passphrase-wrapped OS Credential Manager tier on top, so
  the operator can save vault keys once and re-unlock with a passphrase +
  6-digit authenticator code instead of pasting raw hex every time.

  Cross-platform — Linux, macOS, Windows — and byte-compatible with the
  Node.js + Java reference implementations.

# Tauri 2 emits hyphenated pre-release semver (e.g. 0.1.0-alpha.1). Snap
# accepts that as long as we set grade: devel for non-stable builds.
adopt-info: studio
grade: devel
confinement: strict

license: MIT
issues: https://github.com/davidalmeidac/sealed-env-studio/issues
source-code: https://github.com/davidalmeidac/sealed-env-studio
contact: https://github.com/davidalmeidac

# Plugs the operator's keychain (Secret Service via D-Bus) — this is Tier 1
# of the credstore. Without it, credstore has no Secret Service to call
# inside the sandbox.
plugs:
  password-manager-service:
    interface: password-manager-service

apps:
  sealed-env:
    command: usr/bin/sealed-env-studio
    desktop: usr/share/applications/sealed-env-studio.desktop
    extensions: [gnome]
    plugs:
      - home                       # vaults can live in user's filesystem
      - removable-media            # vaults on USB / mounted shares
      - network                    # required by Tauri's webview
      - desktop
      - desktop-legacy
      - x11
      - wayland
      - opengl
      - audio-playback             # webview side-effect; not used
      - password-manager-service   # OS Credential Manager (credstore Tier 1)

parts:
  studio:
    plugin: rust
    source: .
    source-subdir: app/src-tauri
    rust-channel: stable

    # Node 20 + npm are mounted at /snap/node/current/ during build by
    # snapcraft. Their bin/ directory is automatically on PATH for this
    # part's override-build. This is cleaner than maintaining a separate
    # nodejs part with manual organize: rules that don't propagate PATH.
    build-snaps:
      - node/20/stable

    build-packages:
      - libgtk-3-dev
      - libwebkit2gtk-4.1-dev
      - libayatana-appindicator3-dev
      - librsvg2-dev
      - libssl-dev
      - pkg-config
      - patchelf
      - file

    stage-packages:
      - libwebkit2gtk-4.1-0
      - libgtk-3-0
      - libayatana-appindicator3-1
      - librsvg2-2

    override-pull: |
      craftctl default
      # Sanity-check the source tree before we waste cycles on cargo
      test -f "$CRAFT_PART_SRC/app/package.json"
      test -f "$CRAFT_PART_SRC/app/src-tauri/Cargo.toml"

    override-build: |
      set -eu

      # 1) Frontend bundle — Tauri's `generate_context!()` macro reads
      # app/dist at compile time and panics if it doesn't exist. Build
      # the frontend FIRST so cargo can pick it up.
      cd "$CRAFT_PART_SRC/app"
      npm ci
      npm run build

      # 2) Tauri Rust binary. We invoke cargo directly (not via the rust
      # plugin's default) because Tauri's bundler (NSIS / .deb / AppImage)
      # is the wrong target inside a snap — we just want the bare binary.
      cd "$CRAFT_PART_SRC/app/src-tauri"
      cargo build --release --locked

      # 3) Stage the binary + desktop integration.
      install -Dm755 \
        "$CRAFT_PART_SRC/app/src-tauri/target/release/sealed-env-studio" \
        "$CRAFT_PART_INSTALL/usr/bin/sealed-env-studio"

      install -Dm644 /dev/stdin \
        "$CRAFT_PART_INSTALL/usr/share/applications/sealed-env-studio.desktop" <<'DESKTOP'
      [Desktop Entry]
      Name=sealed-env Studio
      GenericName=Encrypted .env Manager
      Comment=Desktop GUI for sealed-env vaults
      Exec=sealed-env-studio
      Icon=sealed-env-studio
      Terminal=false
      Type=Application
      Categories=Development;Utility;Security;
      StartupNotify=true
      StartupWMClass=sealed-env-studio
      DESKTOP

      for size in 32 128 256 512; do
        if [ -f "$CRAFT_PART_SRC/app/src-tauri/icons/${size}x${size}.png" ]; then
          install -Dm644 \
            "$CRAFT_PART_SRC/app/src-tauri/icons/${size}x${size}.png" \
            "$CRAFT_PART_INSTALL/usr/share/icons/hicolor/${size}x${size}/apps/sealed-env-studio.png"
        fi
      done

      # 4) adopt-info: derive version + grade from Cargo.toml so the snap
      # metadata stays in lockstep with the Rust crate.
      version=$(grep -m1 '^version' "$CRAFT_PART_SRC/app/src-tauri/Cargo.toml" \
                | cut -d'"' -f2)
      craftctl set version="$version"
      if [ "${version#*-}" != "$version" ]; then
        craftctl set grade=devel
      else
        craftctl set grade=stable
      fi

assumes: [snapd2.55]
